{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button type="button" aria-label="Toggle menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
<button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
  <i class="fas fa-moon"></i>
</button>
<script>
(function(){
  var btn = document.getElementById('theme-toggle');
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    var d = document.documentElement;
    var c = d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    d.setAttribute('data-theme', c);
    localStorage.setItem('theme', c);
    btn.querySelector('i').className = c === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
  }, true);
  var theme = document.documentElement.getAttribute('data-theme');
  if (theme === 'dark') btn.querySelector('i').className = 'fas fa-sun';
})();
</script>
